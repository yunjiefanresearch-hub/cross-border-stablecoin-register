instrument_type: fiat_referenced_stablecoin
instrument_label_local: virtual asset / draft stablecoin (Virtual Asset Service Act)
dimension: permitted_activity_yield
constraint_ref: C3
requirement_summary: the Virtual Asset Service Act (enacted at third reading 30 Jun 2026, not commenced) prohibits
  paying interest or other returns to holders. This yield prohibition aligns Taiwan with the prohibition cluster
  (EU, Hong Kong) rather than the permission cluster (Switzerland, Brazil); it takes operative effect on commencement,
  which awaits FSC subsidiary legislation.
