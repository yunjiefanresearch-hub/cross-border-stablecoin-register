instrument_label_local: virtual asset / draft stablecoin (Virtual Asset Service Act)
dimension: reserve_backing
constraint_ref: C2
requirement_summary: the Virtual Asset Service Act (enacted at third reading 30 Jun 2026, not commenced) requires
  full reserves held at domestic financial institutions, segregated from the issuer's own property. The operative
  reserve detail awaits FSC subsidiary legislation; the only in-force layer is AML registration, which imposes no
  reserve requirements.
