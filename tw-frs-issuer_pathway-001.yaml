interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix v0.9.6. STATUS transitional and
  binding_status made_not_commenced: the Virtual Asset Service Act is enacted (third reading 30 Jun 2026) but its
  issuer-licensing provisions are not yet commenced, awaiting FSC subsidiary legislation with no gazetted date.
  Evidence tier stays firm_summary: an official URL for the bill/announcement is provided (source.url), but there
  is no official English primary text and made_not_commenced provisions carry no operative resolution_text, so the
  cell is not upgraded to citable. The only in-force layer is AML registration (see tw-frs-aml_kyc-001).


  [v0.9.5 verification] The TW issuer regime rests on the Virtual Asset Service Act (虛擬資產服務法). NATIVE-LANGUAGE VERIFICATION
  (Chinese): confirmed against official FSC text: the Legislative Yuan Finance Committee completed the article-by-article
  first review (初審) on 3 Jun 2026 and resolved to send it to the plenary (no caucus negotiation). The stablecoin
  provisions match the register (FSC permission + prior central-bank consent; issuer = share company; min capital
  set by FSC; par issuance/redemption; no interest; reserves at domestic FIs, segregated). Procedurally then ahead
  of KR''s DABA, still in subcommittee. The in-force VASP-AML registration layer is recorded separately.


  [v0.9.9 update] The bill passed third reading on 30 Jun 2026, the dateline of this draft, moving the cell from
  proposed to transitional (enacted, not commenced); binding_status moved from pending_proposal to made_not_commenced.
  Commencement awaits FSC subsidiary legislation (roughly nine subordinate items, indicative timetable around Q1
  2027) with no gazetted date. In the time engine Taiwan is now a regime-in-transition destination: inbound edges
  are held at Category T and resolve to a channelled Category II on commencement, while origin edges stay Category
  III because enactment creates no exportable token.'
