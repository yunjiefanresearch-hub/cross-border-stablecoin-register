id: tw-frs-issuer_pathway-001
jurisdiction: TW
authority: FSC (would administer)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: virtual asset / draft stablecoin (Virtual Asset Service Act)
dimension: issuer_pathway
constraint_ref: C1
requirement_summary: 'No stablecoin issuer is licensed yet: the licensing regime is enacted but not yet commenced.
  The Virtual Asset Service Act, passed at third reading on 30 Jun 2026, requires an FSC licence for stablecoin
  issuance, available to a share company (corporation limited by shares), with banks expected to lead initial issuance.
  The Act awaits FSC subsidiary legislation (roughly nine subordinate items, indicative timetable around Q1 2027)
  and has no gazetted commencement date, so these provisions are enacted law not yet in force.'
requirement_structured:
  in_force: no licensing regime in force; no issuer licensed yet
  enacted_not_commenced: FSC licence; share company; banks to lead initially (VAS Act, third reading 30 Jun 2026)
  status_note: enacted at third reading, awaiting FSC subsidiary legislation; no gazetted commencement
status: transitional
