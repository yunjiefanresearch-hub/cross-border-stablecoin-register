id: eu-emt-regulatory_authority-001
jurisdiction: EU
authority: EBA, ESMA, national competent authorities (NCAs)
instrument_type: e_money_token
instrument_label_local: e-money token (EMT) / asset-referenced token (ART)
dimension: regulatory_authority
requirement_summary: The Markets in Crypto-Assets Regulation (MiCA, Reg. (EU) 2023/1114) governs EMTs and ARTs,
  supervised by the EBA (significant tokens), ESMA, and national competent authorities. MiCA's Article 143(3)
  transitional grandfathering closes on a staggered national schedule capped at 1 July 2026, the outer limit
  (the longest window any Member State could grant; ESMA has confirmed no extension). Most Member States set
  shorter windows and closed earlier, so the deadline binding a given corridor is the earliest among the Member
  States it touches, not the 1 July 2026 cap. A PSD2/MiCAR interplay question is addressed by the EBA No-Action
  Letter (10 June 2025).
