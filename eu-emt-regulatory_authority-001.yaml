interpretation_note: 'Provenance: transcribed from author''s Compliance Matrix v0.9.3.


  [v0.9.5 verification] Confirmed: MiCA Titles III/IV and the EBA/ESMA/NCA architecture.


  [v0.9.9 correction] The Article 143(3) transitional framing was corrected from the earlier uniform
  "ends 1 July 2026" to the staggered national schedule, verified against ESMA''s statement and the official
  Article 143(3) grandfathering list: 1 July 2026 is the outer cap (France, Malta, Luxembourg run the full
  window), while Germany and Ireland closed at 12 months (end 2025), Sweden at 9 months (late 2025), and
  Finland, Latvia, Lithuania, Hungary, the Netherlands, Poland, and Slovenia at 6 months (mid-2025). The
  binding date for a corridor is the earliest deadline among the Member States it touches. This aligns the
  register with the flagship paper''s corrected §3.10; the citable proposition (MiCA Titles III/IV +
  EBA/ESMA/NCA architecture, verified against the OJ text) is unchanged, so binding_status, evidence_tier,
  and the verification block are untouched. The dated national schedule is carried structurally in the event
  calendar (eu-mica-art143-transitional-expiry, trigger_kind=intra-regime-gating).'
