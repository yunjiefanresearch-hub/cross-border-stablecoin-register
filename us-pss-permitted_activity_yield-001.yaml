requirement_summary: "CLARITY Act Sec. 404(c)(1) prohibits a covered party from paying any form of interest or yield to a restricted recipient (A) solely in connection with the holding of payment stablecoins, or (B) on a payment stablecoin balance in a manner economically or functionally equivalent to interest on an interest-bearing bank deposit. Bona fide activity- or transaction-based rewards are permitted, with scope to be defined by joint SEC/CFTC/Treasury rulemaking. <VERIFY exact carve-out wording against the engrossed bill text>"
