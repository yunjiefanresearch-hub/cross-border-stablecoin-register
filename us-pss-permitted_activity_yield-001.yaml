  - citation: "Fan, Narrowing the Section 404 Prohibition (Independent Policy Brief, 6 May 2026; SSRN), §VI six-factor test"
interpretation_note: "ANCHOR / LIVE WINDOW. CLARITY §404 passed Senate Banking 15-9 on 14 May 2026 and awaits floor passage. The bona-fide-activity boundary is the open question; the author's position is that user-initiated routing into 1940-Act registered tokenised MMFs falls outside the prohibition because the operative step is the user's signed authorisation, not the holding (see securities_classification + bank_nonbank_routing records)."
interpretive_flag:
  tension: "'bona fide activity' is undefined in the statute; the issuer-layer 'solely' and intermediary-layer 'economically or functionally equivalent' comparators leave the routing/market-making carve-out unsettled."
  resolution_channel: "Post-enactment joint SEC/CFTC/Treasury NPRM (12-month window); Senate Banking Committee Report as upstream legislative history; SEC Crypto Task Force written-input channel (open now)."
