  tension: "Whether the UK regulated perimeter is triggered by any one lifecycle limb (HMT policy note) or requires all three limbs in the UK (SI 2026/102 Art. 9M(2) / FSMA s.418)."
  resolution_channel: "FCA summer 2026 policy statement."
