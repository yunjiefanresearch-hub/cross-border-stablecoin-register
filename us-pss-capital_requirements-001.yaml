id: us-pss-capital_requirements-001
jurisdiction: US
authority: "OCC, FDIC"
instrument_type: payment_stablecoin
instrument_label_local: "payment stablecoin"
dimension: capital_requirements
constraint_ref: C2
requirement_summary: "De novo PPSIs must hold minimum capital of the greater of $5 million or the chartering-condition amount, for 36 months. An operational backstop of 12 months of operating expenses must be held in cash, FDIC-insured deposits, or short-dated Treasuries (<=93 days). Two consecutive quarter-ends below the capital or backstop requirement trigger mandatory liquidation."
