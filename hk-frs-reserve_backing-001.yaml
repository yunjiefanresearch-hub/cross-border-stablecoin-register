id: hk-frs-reserve_backing-001
jurisdiction: HK
authority: HKMA
instrument_type: fiat_referenced_stablecoin
instrument_label_local: "specified stablecoin"
dimension: reserve_backing
constraint_ref: C2
requirement_summary: "100% backing at all times; the market value of reserve assets must equal or exceed the par value of circulating stablecoins, with HKMA expecting overcollateralisation. Acceptable assets: cash, bank deposits (term <= 3 months), government and central-bank securities (residual maturity <= 1 year), and tokenised forms of the foregoing. Reserves must be strictly segregated from the issuer's other assets and protected against creditor claims via statutory trust."
requirement_structured:
  backing_ratio: "100% (overcollateralisation expected)"
  eligible_assets: ["cash", "bank deposits <=3mo", "govt/central-bank securities <=1yr", "tokenised forms thereof"]
  segregation: "statutory trust; creditor-remote"
status: in_force
effective_date: "2025-08-01"
source:
  primary: "Stablecoins Ordinance (Cap. 656), reserve / backing requirements"
  pinpoint: "100% backing; eligible-asset list; segregation / statutory trust"
secondary:
