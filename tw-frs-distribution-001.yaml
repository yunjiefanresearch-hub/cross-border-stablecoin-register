requirement_summary: No stablecoin-specific distribution regime is yet operative. the Virtual Asset Service Act
  (enacted at third reading 30 Jun 2026, not commenced) sets the offering provisions, which take effect on commencement;
  commencement awaits FSC subsidiary legislation. The backdrop is the central bank's control of the NTD and the
  offshore-NTD posture.
