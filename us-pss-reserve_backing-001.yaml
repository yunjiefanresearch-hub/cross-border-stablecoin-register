id: us-pss-reserve_backing-001
jurisdiction: US
authority: "OCC, FDIC"
instrument_type: payment_stablecoin
instrument_label_local: "payment stablecoin"
dimension: reserve_backing
constraint_ref: C2
requirement_summary: "1:1 backing of outstanding payment stablecoins at fair value. Permissible reserve assets (proposed 12 CFR §15.11(b)): US currency; demand deposits at IDIs; short-term Treasury bills (<=93 days); certain reverse repos (incl. intraday); registered government MMFs (underlying Treasuries <=93 days); and tokenised forms thereof. Stablecoins and other crypto-assets are excluded. Reserves must be segregated, identifiable, held directly by the issuer or custodied at an eligible institution, and cannot be pledged, rehypothecated, or reused (narrow margin/custodial exceptions). PPSIs with issuance >= $25 billion must hold 0.5% of reserves (capped at $500m) in insured deposits/shares."
status: proposed
effective_date: null
source:
