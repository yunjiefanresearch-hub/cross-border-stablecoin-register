id: tw-frs-monetary_sovereignty-001
jurisdiction: TW
authority: CBC (central bank)
instrument_type: fiat_referenced_stablecoin
instrument_label_local: virtual asset / draft stablecoin (Virtual Asset Service Act)
dimension: monetary_sovereignty
constraint_ref: C7
requirement_summary: the Virtual Asset Service Act (enacted at third reading 30 Jun 2026, not commenced) creates
  the framework, but no operative monetary-sovereignty cap is yet in force. The backdrop is the central bank's control
  of the NTD and the offshore-NTD posture; the peg currency for a Taiwan stablecoin (NTD vs USD) is officially undecided
  and is the defining open question, to be settled through commencement and FSC/CBC subsidiary rules.
requirement_structured:
  enacted_not_commenced: framework enacted; operative cap and peg-currency decision pending
  backdrop: CBC control of NTD; offshore-NTD posture
  peg_currency: officially undecided (NTD vs USD)
  ntd_peg: engages monetary-sovereignty concerns directly
  usd_peg: engages offshore-NTD and capital-flow concerns
status: transitional
source:
  primary: CBC public statements; draft Virtual Asset Service Act
  pinpoint: 'Monetary sovereignty: framework enacted, operative cap and peg-currency decision pending (not commenced)'
  url: https://english.ey.gov.tw/
secondary:
