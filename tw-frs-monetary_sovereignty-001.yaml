    summaries).'
interpretation_note: 'Provenance: transcribed from the author''s Compliance Matrix v0.9.6; an official URL is provided
  (source.url), but there is no official English primary text and made_not_commenced provisions carry no operative
  resolution_text, so the cell stays firm_summary (non-citable). STATUS transitional: there is no in-force C7 cap;
  the peg-currency decision is the defining open issue (Matrix interpretive flag).


  [v0.9.9 enactment] The Virtual Asset Service Act passed third reading on 30 Jun 2026, so this cell moves from
  proposed to transitional (binding_status pending_proposal -> made_not_commenced), matching tw-frs-issuer_pathway-001.
  The provision is enacted but not commenced; its operative detail awaits FSC subsidiary legislation, and the cell
  stays non-citable (firm_summary, no resolution_text).'
interpretive_flag:
  tension: 'The peg-currency question (NTD vs USD) is the defining open issue: a NTD peg engages the central bank''s
    monetary-sovereignty concerns; a USD peg engages offshore-NTD and capital-flow concerns.'
  resolution_channel: Enactment of the Virtual Asset Service Act and the central bank's ultimate posture.
